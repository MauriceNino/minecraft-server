services:
  paper:
    build:
      context: ../../
      dockerfile: Dockerfile
    volumes:
      - ./templates:/data/templates:ro
      - ./data/paper:/data/runtime
    ports:
      - "25570:25565"
    env_file: .env
    environment:
      TYPE: PAPER
      VERSION: latest
      MEMORY: 512M
      ACCEPT_EULA: "true"

  folia:
