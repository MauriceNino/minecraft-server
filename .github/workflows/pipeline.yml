name: Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  GHCR_IMAGE: ghcr.io/mauricenino/minecraft-server
  DOCKERHUB_IMAGE: mauricenino/minecraft-server

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Pyright type check
        run: uv run pyright src/

      - name: Run tests
        run: uv run pytest

  deploy-image:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        java-version: [21, 23, 25]
        java-flavor: [temurin, corretto, microsoft, azul, graalvm]
        is-main: [ "${{ github.ref == 'refs/heads/main' }}" ]
        exclude:
          # Version 23 does not exist for microsoft
          - java-flavor: microsoft
            java-version: 23
          # On non-main branches, only build Java 25 Temurin to save resources
          - is-main: false
            java-version: 21
          - is-main: false
            java-version: 23
          - is-main: false
            java-flavor: corretto
          - is-main: false
            java-flavor: microsoft
          - is-main: false
            java-flavor: azul
          - is-main: false
            java-flavor: graalvm

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            # Only on main: latest for Java 25 Temurin
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && matrix.java-version == 25 && matrix.java-flavor == 'temurin' }}
            # Only on main: java${version}-${flavor}
            type=raw,value=java${{ matrix.java-version }}-${{ matrix.java-flavor }},enable=${{ github.ref == 'refs/heads/main' }}
            # On branches: branch name (for the default combo)
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            JAVA_VERSION=${{ matrix.java-version }}
            JAVA_FLAVOR=${{ matrix.java-flavor }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-docs:
    name: Build & Deploy Docs
    needs: deploy-image
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: "pages"
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: docs

      - name: Build static site
        run: bun run build
        working-directory: docs
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create Release
    needs: [deploy-image, deploy-docs]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate Grouped Release Notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. Try to find the most recent tag in the repository
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # 2. Get the log based on whether a tag was found
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found. Grabbing all commits since the beginning."
            git log --pretty=format:"%s _by @%cn_ (%h)" > raw_commits.txt
          else
            echo "Comparing changes from $PREVIOUS_TAG to HEAD..."
            git log ${PREVIOUS_TAG}..HEAD --pretty=format:"%s _by @%cn_ (%h)" > raw_commits.txt
          fi

          echo "Generating patchnotes for commits:"
          cat raw_commits.txt
          
          # 3. Clean up old text files
          rm -f feats.txt fixes.txt docs.txt chores.txt others.txt notes.txt
          
          # 4. Sort the commits into categories
          while IFS= read -r line; do
            [ -z "$line" ] || [ "${line#*:}" = "$line" ] && continue

            # Remove everything after '(' and then after ':'
            type="${line%%(*}"
            type="${type%%:*}"

            # Remove everything before ':' and the space after it
            desc="${line#*:}"
            desc="${desc# }"

            case "$type" in
              feat)
                target="feats.txt" ;;
              fix)
                target="fixes.txt" ;;
              docs)
                target="docs.txt" ;;
              chore|refactor|style|test|ci)
                target="chores.txt" ;;
              *)
                continue ;; # Skip unknown types
            esac

            echo "- $desc" >> "$target"
          done < raw_commits.txt

          # 5. Compile the final Markdown release notes
          append_section() {
            if [ -f "$1" ]; then
              printf "### %s\n$(cat "$1")\n\n" "$2" >> notes.txt
            fi
          }

          append_section "feats.txt"  "🚀 Features"
          append_section "fixes.txt"  "🐛 Bug Fixes"
          append_section "docs.txt"   "📚 Documentation"
          append_section "chores.txt" "🧹 Maintenance"

          # 6. Generate the unique tag name
          TAG_NAME=$(date +'%Y.%-m.%-d')-$(git rev-parse --short HEAD)
          echo "Generated Tag: $TAG_NAME"
          
          # 7. Create the tag locally and push it
          git tag $TAG_NAME
          git push origin $TAG_NAME
          
          # 8. Create the GitHub Release targeting the new tag
          gh release create $TAG_NAME --title "$TAG_NAME" --notes-file notes.txt